          frictionloss: null
          viscous_damping: null
          delay_min_lag: 0
          delay_max_lag: 0
          delay_hold_prob: 0.0
          delay_update_period: 0
          delay_per_env_phase: true
          stiffness: 20.0
          damping: 1.0
          effort_limit: 23.5
        - target_names_expr: !!python/tuple
          - .*thigh_.*
