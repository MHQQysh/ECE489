      - 0.0
      - 1.5
      dir: !!python/tuple
      - 0.0
      - 0.0
      - -1.0
      cutoff: 45.0
      exponent: 10.0
    cameras: !!python/tuple []
    textures: !!python/tuple
    - name: groundplane
      type: 2d
      builtin: checker
      rgb1: !!python/tuple
      - 0.2
      - 0.3
      - 0.4
      rgb2: !!python/tuple
      - 0.1
      - 0.2
      - 0.3
      width: 300
      height: 300
      mark: edge
      markrgb: !!python/tuple
      - 0.8
      - 0.8
      - 0.8
    materials: !!python/tuple
    - name: groundplane
      rgba: !!python/tuple
      - 1.0
      - 1.0
      - 1.0
      - 1.0
      texuniform: true
      texrepeat: !!python/tuple
      - 4.0
      - 4.0
      reflectance: 0.2
      texture: groundplane
      geom_names_expr: !!python/tuple
      - terrain$
    collisions: !!python/tuple []
    terrain_type: plane
    terrain_generator: null
    env_spacing: 2.0
    max_init_terrain_level: 5
    num_envs: 1024
    debug_vis: false
  entities:
    robot:
      init_state:
        pos: !!python/tuple
        - 0.0
        - 0.0
        - 0.32
        rot: !!python/tuple
