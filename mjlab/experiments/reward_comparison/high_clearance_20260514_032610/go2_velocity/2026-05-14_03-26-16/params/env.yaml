    debug_vis: true
    viz:
      hit_color: !!python/tuple
      - 1.0
      - 0.0
      - 1.0
      - 0.8
      miss_color: !!python/tuple
      - 1.0
      - 0.0
      - 0.0
      - 0.4
      hit_sphere_color: !!python/tuple
