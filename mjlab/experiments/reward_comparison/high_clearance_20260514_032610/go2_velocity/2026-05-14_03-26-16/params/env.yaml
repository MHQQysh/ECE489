      mode: geom
      pattern: !!python/tuple
      - FR_foot_collision
      - FL_foot_collision
      - RR_foot_collision
      - RL_foot_collision
      entity: robot
      exclude: !!python/tuple []
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
