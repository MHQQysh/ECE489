        contype: 1
        conaffinity: 0
        condim:
          ^[FR][LR]_foot_collision$: 3
          .*_collision: 1
        priority:
          ^[FR][LR]_foot_collision$: 1
        friction:
          ^[FR][LR]_foot_collision$: !!python/tuple
          - 0.6
        solref: null
        solimp:
          ^[FR][LR]_foot_collision$: !!python/tuple
          - 0.9
          - 0.95
          - 0.023
        margin: null
        gap: null
        solmix: null
        disable_other_geoms: true
  sensors: !!python/tuple
  - name: foot_height_scan
    frame: !!python/tuple
    - type: site
      name: FR
      entity: robot
    - type: site
      name: FL
      entity: robot
    - type: site
      name: RR
      entity: robot
    - type: site
      name: RL
      entity: robot
    pattern:
      rings: !!python/tuple
      - radius: 0.04
        num_samples: 4
      include_center: true
      direction: !!python/tuple
      - 0.0
      - 0.0
      - -1.0
    ray_alignment: yaw
    max_distance: 1.0
    exclude_parent_body: true
    include_geom_groups: !!python/tuple
